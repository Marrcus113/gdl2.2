name: Build Geode Mod

on:
  push:
    branches: [ "main"]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Ninja
        run: |
          curl -L https://github.com/ninja-build/ninja/releases/latest/download/ninja-win.zip -o ninja.zip
          7z x ninja.zip -oninja
          echo "${{ github.workspace }}/ninja" >> $env:GITHUB_PATH
      
      - name: Setup Geode CLI
        run: |
          curl -L https://github.com/geode-sdk/cli/releases/latest/download/geode-cli-v3.7.4-win.zip -o cli.zip
          7z x cli.zip -ocli
          echo "${{ github.workspace }}/cli" >> $env:GITHUB_PATH
          echo "GEODE_CLI=${{ github.workspace }}/cli" >> $env:GITHUB_ENV
      
      - name: Build
        run: |
          geode build
      
      - name: Upload Mod
        uses: actions/upload-artifact@v4
        with:
          name: GDL_mod
          path: build/*.geode
