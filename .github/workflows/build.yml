name: Build Geode Mod

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Geode Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: 'latest'
          cli: 'latest'
          build-config: 'RelWithDebInfo'
      
      - name: Upload Mod
        uses: actions/upload-artifact@v4
        with:
          name: GDL_Mod
          path: build/*.geode
